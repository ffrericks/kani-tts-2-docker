version: '3.8'

services:
  kani-tts-2:
    image: ghcr.io/ffrericks/kani-tts-2-docker:latest
    container_name: kani-tts-2
    ports:
      - "8001:8001"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - voices_data:/app/voices
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    environment:
      - TZ=Europe/Amsterdam
    labels:
      - "casaos.ui.port=8001"
      - "casaos.ui.path=/"

volumes:
  hf_cache:
    driver: local
  voices_data:
    driver: local

x-casaos:
  architectures:
    - amd64
  main: kani-tts-2
  description:
    en_us: Fast, multilingual Text-to-Speech with voice cloning support, powered by Kani-TTS 2. Generates high-quality speech from text with GPU acceleration.
  tagline:
    en_us: AI Text-to-Speech 2 with Voice Cloning
  developer: nineninesix-ai
  author: ffrericks
  icon: https://cdn-icons-png.flaticon.com/512/11890/11890041.png
  thumbnail: ""
  title:
    en_us: Kani TTS 2
  category: AI
  port_map: "8001"
  scheme: http
  index: /
